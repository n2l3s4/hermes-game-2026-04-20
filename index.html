<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobo's Ocean Match</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #222;
  font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
  touch-action: manipulation;
}
#gameCanvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#muteBtn {
  position: absolute;
  top: 12px; right: 12px;
  width: 56px; height: 56px;
  border: none; border-radius: 50%;
  background: #ff6b6b; color: #fff;
  font-size: 26px; cursor: pointer;
  box-shadow: 0 4px 0 #c92a2a;
  transition: transform 0.1s;
  z-index: 10;
}
#muteBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #c92a2a; }
</style>
</head>
<body>
<button id="muteBtn" aria-label="Mute">🔊</button>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
window.addEventListener('resize', ()=>{ resize(); layoutCards(); });
resize();

let audioCtx = null;
let muted = false;
const muteBtn = document.getElementById('muteBtn');

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.15, when=0) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function playFlip() { playTone(700, 'sine', 0.06, 0.12); }
function playMatch() {
  playTone(523, 'sine', 0.1, 0.18);
  playTone(659, 'sine', 0.1, 0.18, 0.1);
  playTone(784, 'sine', 0.2, 0.18, 0.2);
}
function playMismatch() { playTone(180, 'sawtooth', 0.25, 0.08); }
function playWin() {
  [523, 659, 784, 1047, 784, 1047].forEach((f,i)=> playTone(f, 'sine', 0.25, 0.18, i*0.12));
}

const emojis = ['🐠','🐙','🦀','🐢','🐳','🦑'];
let cards = [];
let flipped = [];
let matchedCount = 0;
let gameOver = false;
let started = false;
let confetti = [];

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

class Card {
  constructor(x, y, w, h, emoji) {
    this.x=x; this.y=y; this.w=w; this.h=h; this.emoji=emoji;
    this.flipped=false; this.matched=false; this.anim=0;
  }
  update() {
    const target = this.flipped ? 1 : 0;
    this.anim += (target - this.anim) * 0.25;
    if (Math.abs(this.anim-target) < 0.005) this.anim = target;
  }
  draw() {
    const cx = this.x + this.w/2;
    const cy = this.y + this.h/2;
    let scale = 1, showFront = false;
    if (this.anim < 0.5) {
      scale = 1 - this.anim * 2;
    } else {
      scale = (this.anim - 0.5) * 2;
      showFront = true;
    }
    if (scale < 0.01) return;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, 1);

    // card body
    ctx.fillStyle = showFront ? '#fff' : (this.matched ? '#90EE90' : '#FF7F50');
    roundRect(ctx, -this.w/2, -this.h/2, this.w, this.h, 16);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.stroke();

    if (showFront) {
      ctx.font = `${this.h*0.55}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.emoji, 0, 4);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(-this.w*0.18, -this.h*0.18, this.w*0.1, 0, Math.PI*2);
      ctx.arc(this.w*0.22, this.h*0.12, this.w*0.08, 0, Math.PI*2);
      ctx.arc(-this.w*0.08, this.h*0.28, this.w*0.06, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${this.h*0.28}px Comic Sans MS`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', 0, 0);
    }
    ctx.restore();
  }
}

function layoutCards() {
  const cols = 3, rows = 4;
  const gap = Math.min(W, H) * 0.04;
  const availW = W - gap * 2;
  const availH = H - 100; // space for title
  const cardW = Math.min((availW - gap*(cols-1))/cols, (availH - gap*(rows-1))/rows * 0.75);
  const cardH = cardW * 1.25;
  const totalW = cols*cardW + (cols-1)*gap;
  const totalH = rows*cardH + (rows-1)*gap;
  const startX = (W - totalW)/2;
  const startY = 90 + (availH - totalH)/2;
  cards.forEach((c,i)=>{
    c.x = startX + (i%cols)*(cardW+gap);
    c.y = startY + Math.floor(i/cols)*(cardH+gap);
    c.w = cardW; c.h = cardH;
  });
}

function initGame() {
  cards = []; flipped = []; matchedCount = 0; gameOver = false; started = false; confetti = [];
  const deck = [...emojis, ...emojis];
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  deck.forEach(e => cards.push(new Card(0,0,0,0,e)));
  layoutCards();
}

function checkMatch() {
  const [a,b] = flipped;
  if (a.emoji === b.emoji) {
    a.matched = true; b.matched = true;
    matchedCount += 2;
    playMatch();
    flipped = [];
    if (matchedCount === cards.length) {
      gameOver = true;
      playWin();
      for (let i=0;i<120;i++) confetti.push({
        x: Math.random()*W, y: -Math.random()*H,
        vx: (Math.random()-0.5)*5, vy: Math.random()*3+2,
        color: `hsl(${Math.random()*360},80%,60%)`, size: Math.random()*10+4,
        rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2
      });
    }
  } else {
    playMismatch();
    a.flipped = false; b.flipped = false;
    flipped = [];
  }
}

function handleInput(ex, ey) {
  if (!started) { started = true; initAudio(); return; }
  if (gameOver) return;
  if (flipped.length >= 2) return;
  for (let c of cards) {
    if (ex >= c.x && ex <= c.x+c.w && ey >= c.y && ey <= c.y+c.h) {
      if (!c.flipped && !c.matched) {
        initAudio();
        c.flipped = true;
        flipped.push(c);
        playFlip();
        if (flipped.length === 2) setTimeout(checkMatch, 700);
      }
      break;
    }
  }
}

canvas.addEventListener('mousedown', e => handleInput(e.offsetX, e.offsetY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  handleInput(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
}, {passive:false});

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
});

function updateConfetti() {
  for (let p of confetti) {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
    if (p.y > H) { p.y = -20; p.x = Math.random()*W; }
  }
}
function drawConfetti() {
  for (let p of confetti) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    ctx.restore();
  }
}

function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#4facfe');
  g.addColorStop(1, '#00f2fe');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // sand bottom
  ctx.fillStyle = '#f4e04d';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H-40);
  ctx.bezierCurveTo(W*0.3, H-80, W*0.7, H-10, W, H-50);
  ctx.lineTo(W, H);
  ctx.fill();
}

function drawTitle() {
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(W*0.08, 52)}px Comic Sans MS`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 12;
  ctx.fillText("Bobo's Ocean Match", W/2, 22);
  ctx.shadowBlur = 0;
}

function loop() {
  drawBg();
  drawTitle();
  cards.forEach(c => { c.update(); c.draw(); });

  if (!started) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W*0.1, 60)}px Comic Sans MS`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Tap to Start', W/2, H/2);
  }

  if (gameOver) {
    updateConfetti();
    drawConfetti();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W*0.13, 72)}px Comic Sans MS`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 20;
    ctx.fillText('Good Game, Bobo!', W/2, H/2 - 20);
    ctx.shadowBlur = 0;

    ctx.font = `${Math.min(W*0.05, 26)}px Comic Sans MS`;
    ctx.fillText('You found all the ocean friends! 🎉', W/2, H/2 + 45);
  }

  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
